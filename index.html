<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Reviews</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="heading">Our Reviews</h1>
  <div class="underline"></div>

  <div class="review-card">
    <div class="top-icons">
      <div class="quote-icon">"</div>
    </div>

    <img src="https://i.pravatar.cc/120?img=12" alt="user" class="user-img" id="userImg">

    <h2 id="name">Kazim</h2>
    <p class="role" id="role">WEB DEVELOPER</p>
    <p class="review-text" id="reviewText">
      Saylani helped me build strong fundamentals in HTML, CSS and JavaScript.
      Now I love building real projects from scratch.
    </p>

    <div class="arrows">
      <span id="prevBtn">&#10094;</span>
      <span id="nextBtn">&#10095;</span>
    </div>

    <button id="surpriseBtn">Surprise Me</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
